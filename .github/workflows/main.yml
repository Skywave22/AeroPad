# AeroPad CI — V2 PART A: cached, size-tracked, lint-gated.
# PASTE THIS ENTIRE FILE into .github/workflows/main.yml on GitHub
# (web UI: open main.yml → pencil icon → select all → paste → commit).
name: Build AeroPad

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # V2 A6 — Gradle build + dependency caching (big CI speedup).
      - name: Gradle (with caching)
        uses: gradle/actions/setup-gradle@v3

      # FIX: GitHub's web-UI upload strips the executable bit from gradlew
      # ("Permission denied", exit 126). Restore it before any gradle call.
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # V2 A6 — lint gate: serious issues fail the build.
      - name: Lint (fatal on error)
        run: ./gradlew lintDebug

      - name: Assemble release
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > keystore.jks
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=${PWD}/keystore.jks \
              -Pandroid.injected.signing.store.password="$KEYSTORE_PASS" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASS"
          else
            echo "No keystore secrets - building unsigned release"
            ./gradlew assembleRelease
          fi

      # V2 A6 - APK size tracking (job summary each run).
      - name: APK size report
        run: |
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          SIZE=$(du -h "$APK" | cut -f1)
          echo "## APK size: $SIZE" >> $GITHUB_STEP_SUMMARY
          du -b "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aeropad-release
          path: app/build/outputs/apk/release/*.apk
